services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: tribook
      POSTGRES_PASSWORD: tribook
      POSTGRES_DB: tribook
    ports:
      - "5433:5432"
    volumes:
      - tribook_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tribook -d tribook"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tribook_postgres:

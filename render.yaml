# Render Blueprint for the Tribook monorepo.
# Deploys two independent Web Services:
#   - tribook-frontend : the Next.js dApp (reads Sui testnet directly)
#   - tribook-agent    : the off-chain rebalancing agent + HTTP API
# The two services do NOT talk to each other; they share state only through
# the on-chain vault. See DEPLOY.md for the full walkthrough.
services:
  - type: web
    name: tribook-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: "20"

  - type: web
    name: tribook-agent
    runtime: node
    rootDir: agent
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"

      # ── Execution ────────────────────────────────────────────────
      # Start in observe (no transactions). Switch to "live" once
      # SUI_PRIVATE_KEY below is set and funded with testnet SUI for gas.
      - key: EXECUTION_MODE
        value: observe
      # AgentCap holder's key. Required only for EXECUTION_MODE=live.
      - key: SUI_PRIVATE_KEY
        sync: false
      # Optional narration layer.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash

      # ── Network ──────────────────────────────────────────────────
      - key: SUI_NETWORK
        value: testnet
      - key: SUI_RPC_URL
        value: https://fullnode.testnet.sui.io:443

      # ── Public Tribook testnet object IDs ────────────────────────
      - key: PACKAGE_ID
        value: "0x30fc00c84984342f69a81cf114798d0f820c9e009121184e86761ad957ee99f6"
      - key: VAULT_ID
        value: "0x6351c896d9881fa9a04dedb00d37af0983a836d1d04063088825620bb121b3e1"
      - key: AGENT_CAP_ID
        value: "0xd94685dae90dde97f2c3cd724ad0e9dfd130edf1b2f845bb19a6e6db9d24acc0"
      - key: BALANCE_MANAGER_ID
        value: "0x352df9be32ff04f78df95395f66cf5036fe09ad635ea56c299c1d8ca4ac851e1"
      - key: MARGIN_MANAGER_ID
        value: "0x60e1030afb8f3782bba2e1c54e7c83a9ac97c2a38662889c82fed12ee60c037f"
      - key: MARGIN_REGISTRY_ID
        value: "0x5a79ac5c799771edd9ff8e229450257f16c7a693a284c69b5fe1a80a76031a34"
      - key: USDC_MARGIN_POOL_ID
        value: "0xf08568da93834e1ee04f09902ac7b1e78d3fdf113ab4d2106c7265e95318b14d"
      - key: SUI_MARGIN_POOL_ID
        value: "0xcdbbe6a72e639b647296788e2e4b1cac5cea4246028ba388ba1332ff9a382eea"
      - key: SUI_USDC_POOL_ID
        value: "0x1c19362ca52b8ffd7a33cee805a67d40f31e6ba303753fd3a4cfdfacea7163a5"

      - key: USDC_TYPE
        value: "0xf7152c05930480cd740d7311b5b8b45c6f488e3a53a11c3f74a6fac36a52e0d7::DBUSDC::DBUSDC"
      - key: SUI_TYPE
        value: "0x2::sui::SUI"
      - key: DEEP_TYPE
        value: "0x36dbef866a1d62bf7328989a10fb2f07d769f4ee587c0de4a0a256e57e0a58a8::deep::DEEP"

      - key: PYTH_PACKAGE_ID
        value: "0xabf837e98c26087cba0883c0a7a28326b1fa3c5e1e2c5abdb486f9e8f594c837"
      - key: SUI_PRICE_INFO_OBJECT_ID
        value: "0x1ebb295c789cc42b3b2a1606482cd1c7124076a0f5676718501fda8c7fd075a0"
      - key: USDC_PRICE_INFO_OBJECT_ID
        value: "0x9c4dd4008297ffa5e480684b8100ec21cc934405ed9a25d4e4d7b6259aad9c81"

      # ── Strategy + risk policy ───────────────────────────────────
      - key: PRICE_ASSET
        value: SUI
      - key: DROP_TRIGGER_BPS
        value: "200"
      - key: RISE_TRIGGER_BPS
        value: "200"
      - key: MARGIN_SPLIT_BPS
        value: "3000"
      - key: POLL_INTERVAL_MS
        value: "15000"
      - key: MIN_CONFIDENCE
        value: "0.70"
      - key: MAX_ACTION_USDC
        value: "5"
      - key: MAX_DAILY_TURNOVER_USDC
        value: "50"
      - key: MIN_IDLE_BUFFER_BPS
        value: "1000"

      # ── Self-contained demo price signal ─────────────────────────
      - key: SIMULATE_PRICES
        value: "1"
      - key: SIMULATOR_BASE_PRICE
        value: "0.71"
      - key: SIMULATOR_PERIOD_S
        value: "60"
      - key: SIMULATOR_AMP_PCT
        value: "4"

      # NOTE: do NOT set API_PORT. Render injects PORT and the agent binds it
      # automatically; setting API_PORT would override Render's port and the
      # health check would fail.
